# =============================================================================
# pupil310 — macOS-compatible environment
# Generated from pupil310.yml (Windows) with platform adaptations.
#
# Usage:
#   conda env create -f dep.yml
#   conda activate pupil310
#
# Prerequisites (install via Homebrew BEFORE creating this env):
#   brew install portaudio ffmpeg glfw libusb
# =============================================================================
name: pupil310
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - setuptools
  - wheel
  - bzip2
  - ca-certificates
  - expat
  - libexpat
  - libffi
  - libzlib
  - openssl
  - sqlite
  - tk
  - xz
  - zlib
  - pip:
      # ── Core ML / Deep Learning ───────────────────────────────────────
      - torch==2.6.0               # CPU/MPS build (no CUDA on macOS)
      - torchaudio==2.6.0
      - torchvision==0.21.0
      - jax==0.6.2
      - jaxlib==0.6.2
      - transformers==5.2.0
      - tokenizers==0.22.2
      - safetensors==0.7.0
      - huggingface-hub==1.4.1
      - hf-xet==1.2.0
      - ml-dtypes==0.5.4
      - flatbuffers==25.12.19
      - sympy==1.13.1
      - mpmath==1.3.0
      - opt-einsum==3.4.0
      - absl-py==2.4.0

      # ── Computer Vision ───────────────────────────────────────────────
      - opencv-contrib-python==4.13.0.92
      - opencv-python==4.11.0.86
      - mediapipe==0.10.14         # x86_64 wheels only; Apple Silicon uses Rosetta
      - pillow==12.1.1

      # ── Audio ──────────────────────────────────────────────────────────
      - sounddevice==0.5.5         # requires: brew install portaudio
      - soundfile==0.13.1
      - av==16.1.0                 # requires: brew install ffmpeg

      # ── Web / API Framework ───────────────────────────────────────────
      - fastapi==0.129.0
      - starlette==0.52.1
      - uvicorn==0.41.0
      - httptools==0.7.1
      - watchfiles==1.1.1
      - python-multipart==0.0.22
      - httpx==0.28.1
      - httpcore==1.0.9
      - h11==0.16.0
      - anyio==4.12.1
      - sniffio==1.3.1

      # ── LiveKit (WebRTC) ──────────────────────────────────────────────
      - livekit==1.1.2
      - livekit-agents==1.4.5
      - livekit-api==1.1.0
      - livekit-blingfire==1.1.0
      - livekit-protocol==1.1.2

      # ── LLM / AI APIs ─────────────────────────────────────────────────
      - openai==2.26.0
      - google-generativeai
      - googleapis-common-protos==1.73.0
      - grpcio==1.78.0
      - pyjwt==2.12.0

      # ── Task Queue / Message Broker ────────────────────────────────────
      - celery==5.6.2
      - kombu==5.6.2
      - amqp==5.3.1
      - billiard==4.2.4
      - vine==5.1.0
      - redis==6.4.0

      # ── Data / Science ────────────────────────────────────────────────
      - numpy==2.2.6
      - scipy==1.15.3
      - scikit-learn==1.7.2
      - matplotlib==3.10.8
      - contourpy==1.3.2
      - cycler==0.12.1
      - fonttools==4.62.0
      - kiwisolver==1.5.0
      - pyparsing==3.3.2
      - python-dateutil==2.9.0.post0
      - numexpr==2.14.1
      - networkx==3.4.2
      - joblib==1.5.3
      - threadpoolctl==3.6.0

      # ── Pydantic / Typing ─────────────────────────────────────────────
      - pydantic==2.12.5
      - pydantic-core==2.41.5
      - annotated-types==0.7.0
      - typing-extensions==4.15.0
      - typing-inspection==0.4.2
      - eval-type-backport==0.3.1

      # ── Async / Networking ────────────────────────────────────────────
      - aiohttp==3.13.3
      - aiofiles==25.1.0
      - aiohappyeyeballs==2.6.1
      - aiosignal==1.4.0
      - async-timeout==5.0.1
      - frozenlist==1.8.0
      - multidict==6.7.1
      - yarl==1.23.0
      - propcache==0.4.1
      - websockets==16.0

      # ── Pupil Labs (eye tracking) ─────────────────────────────────────
      # NOTE: These may require building from source on macOS.
      #       Install libuvc first: brew install libusb
      - pupil-apriltags==1.0.4.post11
      - pupil-detectors==2.0.2
      - pye3d==0.3.2
      - ndsi==1.4.5
      # - pupil-labs-uvc==1.0.0    # May fail on macOS — build from source if needed
      # - pyglui==1.31.1           # No macOS wheel — must build from source with Cython

      # ── OpenGL / Graphics ─────────────────────────────────────────────
      - pyopengl==3.1.10
      - glfw==2.10.0               # requires: brew install glfw

      # ── Document Parsing ──────────────────────────────────────────────
      - pymupdf

      # ── CLI / TUI ─────────────────────────────────────────────────────
