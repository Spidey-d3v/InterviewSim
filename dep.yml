      - prompt-toolkit==3.0.52
      - wcwidth==0.6.0
      - colorama==0.4.6

      # ── GUI Automation (macOS-adapted) ─────────────────────────────────
      # keyboard is removed — needs root on macOS and is unreliable.
      # Use 'pynput' as a macOS-compatible alternative if needed.
      - pyautogui==0.9.54
      - pyobjc-core                # Required by pyautogui on macOS
      - pyobjc-framework-Quartz    # Required by pyautogui on macOS
      - mouseinfo==0.1.3
      - pymsgbox==2.0.1
      - pyscreeze==1.0.1
      - pyrect==0.2.0
      - pytweening==1.2.0
