      - sortedcontainers==2.4.0
      - exceptiongroup==1.3.1
      - importlib-metadata==8.7.1
      - zipp==3.23.0
      - ipaddress==1.0.23
      - distro==1.9.0
      - psutil==7.2.2
      - prometheus-client==0.24.1
      - types-protobuf==6.32.1.20260221
      - tzdata==2025.3
      - tzlocal==5.3.1

      # ── Removed (Windows-only) ────────────────────────────────────────
      # - pywin32==311              # Win32 API — no macOS equivalent
      # - win-inet-pton==1.1.0     # Windows inet_pton shim — not needed
      # - pygetwindow==0.0.9       # Win32 window management — no macOS support
