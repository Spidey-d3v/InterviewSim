      - pyzmq==27.1.0
      - zeromq-pyre==0.3.4
      - msgpack==1.1.2

      # ── Config / Env ──────────────────────────────────────────────────
      - python-dotenv==1.2.1
      - pyyaml==6.0.3
      - annotated-doc==0.0.4
      - docstring-parser==0.17.0

      # ── HTTP / Requests ───────────────────────────────────────────────
